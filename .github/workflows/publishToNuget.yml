name: Publish C# SDK to NuGet
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (latest, beta, alpha). Appended to version for non-latest.'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Get Branch Name
        id: branch_name
        run: echo "BRANCH_NAME=$(git branch --show-current)" >> $GITHUB_OUTPUT

      - name: Compute Final Version
        id: version
        working-directory: sdks/csharp/src/thoughtspot_rest_api_sdk
        run: |
          BASE_VERSION=$(grep -oP '(?<=<Version>).*(?=</Version>)' thoughtspot_rest_api_sdk.csproj)
          BRANCH_NAME="${{ steps.branch_name.outputs.BRANCH_NAME }}"
          TAG=$(echo "${{ github.event.inputs.tag }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "$TAG" = "latest" ]; then
            # Rule 1: 'latest' can ONLY be used on the 'release' branch
            if [ "$BRANCH_NAME" != "release" ]; then
              echo "Error: The 'latest' tag can only be used when publishing from the 'release' branch."
              echo "Current branch: $BRANCH_NAME"
              exit 1
            fi
            # Stable release: version remains exactly as it is in .csproj
            FINAL_VERSION="$BASE_VERSION"
          else
            # Rule 2 & 3: For any other tag (beta, alpha), append it dynamically
            # We append .${{ github.run_number }} so multiple beta builds don't collide on NuGet
            FINAL_VERSION="${BASE_VERSION}-${TAG}.${{ github.run_number }}"
          fi
          
          echo "Base Version from .csproj: $BASE_VERSION"
          echo "Computed Final Version: $FINAL_VERSION"
          echo "final_version=$FINAL_VERSION" >> $GITHUB_OUTPUT

      - name: Build SDK
        working-directory: sdks/csharp
        # Pass the newly computed version into the build process
        run: dotnet build -c Release -p:Version=${{ steps.version.outputs.final_version }}

      - name: Pack SDK
        working-directory: sdks/csharp
        # Pass the newly computed version into the pack process
        run: dotnet pack -c Release -p:Version=${{ steps.version.outputs.final_version }} -o ./nupkg

      - name: Point smoke test at the packed .nupkg
        working-directory: testing/csharp
        run: |
          dotnet remove reference ../../sdks/csharp/src/thoughtspot_rest_api_sdk/thoughtspot_rest_api_sdk.csproj
          dotnet add package thoughtspot_rest_api_sdk \
            --version ${{ steps.version.outputs.final_version }} \
            --source ${{ github.workspace }}/sdks/csharp/nupkg

      - name: Run C# SDK smoke tests against the packed SDK
        working-directory: testing/csharp
        env:
          TS_HOST: ${{ secrets.TS_HOST }}
          TS_USERNAME: ${{ secrets.TS_USERNAME }}
          TS_PASSWORD: ${{ secrets.TS_PASSWORD }}
        run: dotnet run -c Release

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        working-directory: sdks/csharp
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Summary
        run: |
          echo "Published thoughtspot_rest_api_sdk@${{ steps.version.outputs.final_version }} from branch ${{ steps.branch_name.outputs.BRANCH_NAME }}" >> $GITHUB_STEP_SUMMARY
